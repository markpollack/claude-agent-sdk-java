name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    uses: markpollack/build-tools/.github/workflows/ci-build.yml@main
    with:
      java-version: '21'
      agent-clis: 'claude'
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
